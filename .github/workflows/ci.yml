name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate derived data
        run: npm run data:generate

      - name: Validate data
        run: npm run data:validate

      - name: Compare dual-source versions
        run: npm run data:compare

      - name: Audit story appearance and dialogue
        run: npx tsx scripts/audit-story-appearance-dialogue.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
